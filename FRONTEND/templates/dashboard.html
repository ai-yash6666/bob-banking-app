{% extends "base.html" %}

{% block title %}Dashboard — SecureBank{% endblock %}

{% block content %}
<!-- Balance display -->
<div class="row justify-content-center mb-4">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card text-center border-primary">
      <div class="card-body py-4">
        <h5 class="card-title text-muted text-uppercase small fw-bold mb-1">Current Balance</h5>
        <p class="display-5 fw-bold text-primary mb-0">${{ "%.2f"|format(balance) }}</p>
      </div>
    </div>
  </div>
</div>

<!-- Deposit and Withdraw forms -->
<div class="row g-4 justify-content-center">

  <!-- Deposit -->
  <div class="col-12 col-md-5">
    <div class="card h-100">
      <div class="card-body">
        <h5 class="card-title mb-3">Deposit Funds</h5>
        <form action="{{ url_for('transactions.deposit') }}" method="POST">
          <div class="mb-3">
            <label for="deposit-amount" class="form-label">Amount ($)</label>
            <input
              type="number"
              class="form-control"
              id="deposit-amount"
              name="amount"
              min="0.01"
              step="0.01"
              placeholder="0.00"
              required
            />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-success">Deposit</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Withdraw -->
  <div class="col-12 col-md-5">
    <div class="card h-100">
      <div class="card-body">
        <h5 class="card-title mb-3">Withdraw Funds</h5>
        <form action="{{ url_for('transactions.withdraw') }}" method="POST">
          <div class="mb-3">
            <label for="withdraw-amount" class="form-label">Amount ($)</label>
            <input
              type="number"
              class="form-control"
              id="withdraw-amount"
              name="amount"
              min="0.01"
              step="0.01"
              placeholder="0.00"
              required
            />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-danger">Withdraw</button>
          </div>
        </form>
      </div>
    </div>
  </div>

</div>
{% endblock %}
